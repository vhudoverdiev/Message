<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VK CRM Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar glass-panel">
        <div class="brand">
            <span class="brand-dot"></span>
            <h2>VK CRM Pro</h2>
        </div>

        <nav class="menu">
            <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/accounts" class="{% if request.url.path == '/accounts' %}active{% endif %}">VK Аккаунты</a>
            <a href="/messages" class="{% if request.url.path == '/messages' %}active{% endif %}">Сообщения</a>
            <a href="/clients" class="{% if request.url.path == '/clients' %}active{% endif %}">Клиенты</a>
            <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">Логи</a>
            <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Настройки</a>
        </nav>
    </aside>

    <main class="content-area">
        <header class="topbar glass-panel">
            <label class="search-wrap">
                <span class="search-icon">⌕</span>
                <input class="search-input" type="text" placeholder="Search" aria-label="Search">
            </label>

            <div class="topbar-actions">
                <button class="icon-btn" aria-label="Notifications">🔔</button>
                <button class="icon-btn" aria-label="Settings">⚙</button>
                <button class="profile-btn" aria-label="Profile">VK</button>
            </div>
        </header>

        <section class="page-content">
            {% block content %}{% endblock %}
        </section>
    </main>
</div>
</body>
</html>
