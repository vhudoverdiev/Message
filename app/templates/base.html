<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ title or 'VK CRM' }}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">VK CRM</div>
        <nav class="menu">
            <a href="/dashboard" class="{% if request.url.path in ['/', '/dashboard'] %}active{% endif %}">Дашборд</a>
            <a href="/accounts" class="{% if '/accounts' in request.url.path %}active{% endif %}">VK аккаунты</a>
            <a href="/messages" class="{% if '/messages' in request.url.path %}active{% endif %}">Сообщения</a>
            <a href="/gmail" class="{% if '/gmail' in request.url.path %}active{% endif %}">Gmail</a>
            <a href="/telegram" class="{% if '/telegram' in request.url.path %}active{% endif %}">Telegram</a>
            <a href="/logs" class="{% if '/logs' in request.url.path %}active{% endif %}">Логи</a>
            <a href="/users" class="{% if '/users' in request.url.path %}active{% endif %}">Пользователи</a>
        </nav>
    </aside>
    <main class="main">
        <header class="topbar">
            <div>
                <strong>{{ current_user.full_name }}</strong>
                <div class="small">@{{ current_user.username }} • {{ current_user.role }}</div>
            </div>
            <div class="topbar-actions">
                <button class="btn secondary icon-btn" type="button" id="theme-toggle" aria-label="Переключить тему">🌙</button>
                <form action="/logout" method="post" class="inline-form">
                    <button class="btn secondary" type="submit">Выход</button>
                </form>
            </div>
        </header>
        {% block content %}{% endblock %}
    </main>
</div>
<script src="/static/app.js?v={{ static_asset_version }}"></script>
</body>
</html>
