<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ title or 'VK CRM' }}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="brand">
                <span class="brand-logo" aria-hidden="true">↗</span>
                <span>VK CRM</span>
            </div>
            <nav class="menu">
                <a href="/dashboard" class="{% if request.url.path in ['/', '/dashboard'] %}active{% endif %}"><span class="menu-icon">🔔</span>Уведомления</a>
                <a href="/accounts" class="{% if '/accounts' in request.url.path %}active{% endif %}"><span class="menu-icon">vk</span>VK аккаунты</a>
                <a href="/messages" class="{% if '/messages' in request.url.path %}active{% endif %}"><span class="menu-icon">💬</span>Сообщения</a>
                <a href="/gmail" class="{% if '/gmail' in request.url.path %}active{% endif %}"><span class="menu-icon">✉️</span>Gmail</a>
                <a href="/telegram" class="{% if '/telegram' in request.url.path %}active{% endif %}"><span class="menu-icon">➤</span>Telegram</a>
                <a href="/logs" class="{% if '/logs' in request.url.path %}active{% endif %}"><span class="menu-icon">🧾</span>Логи</a>
                <a href="/users" class="{% if '/users' in request.url.path %}active{% endif %}"><span class="menu-icon">👥</span>Пользователи</a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="account-panel">
                <div class="account-avatar" aria-hidden="true">↗</div>
                <div class="account-meta">
                    <strong>{{ current_user.full_name }}</strong>
                    <div class="small">@{{ current_user.username }} • {{ current_user.role }}</div>
                </div>
            </div>
            <div class="sidebar-footer-actions">
                <form action="/logout" method="post" class="inline-form sidebar-logout-form">
                    <button class="btn logout-btn" type="submit">⎋ Выйти</button>
                </form>
            </div>
        </div>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="/static/app.js?v={{ static_asset_version }}"></script>
</body>
</html>
